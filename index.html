<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tojik Team | Состав игроков Dota 2</title>
    <style>
        /* ---------- ГЛОБАЛЬНЫЕ СТИЛИ И АНИМАЦИИ ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Bebas Neue', 'Segoe UI', 'Roboto', cursive;
            color: #f0f0f0;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)),
                        url('4uvak.png');
            background-size: 1920px 1080px;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            opacity: 0;
            animation: fadeIn 1.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Золотое свечение для активных элементов */
        @keyframes softGoldGlow {
            0% {
                box-shadow: 0 0 5px rgba(199, 154, 46, 0.3);
            }
            100% {
                box-shadow: 0 0 18px rgba(199, 154, 46, 0.6), 0 0 5px rgba(255, 215, 0, 0.4);
            }
        }

        /* Header и навигация (строгий стиль, в духе Dota) */
        header {
            text-align: center;
            padding: 2rem 0;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 2px solid #c79a2e;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #c79a2e, 0 0 2px black;
            margin: 0;
            font-weight: 700;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideDown 0.8s ease-out 0.4s forwards;
            color: #ece8e0;
        }

        nav {
            margin-top: 1rem;
            opacity: 0;
            animation: slideUp 0.6s ease-out 0.7s forwards;
        }

        nav a {
            color: #e0d6b0;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 0.5rem 1.6rem;
            border: 1px solid #c79a2e;
            border-radius: 4px;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.55);
            display: inline-block;
            font-family: 'Segoe UI', 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            font-weight: 500;
        }

        nav a:hover {
            background: #c79a2e;
            color: #0a0a0f;
            border-color: #ffd966;
            transform: translateY(-2px);
            box-shadow: 0 0 14px rgba(199, 154, 46, 0.7);
        }

        /* Заголовок секции (Игроки) */
        .section-title {
            text-align: center;
            margin: 2rem 0 1rem 0;
            font-size: 2.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: slideDown 0.8s ease-out 0.9s forwards;
            text-shadow: 1px 1px 6px black;
            color: #e6d5a8;
            font-weight: 500;
            border-bottom: 1px dashed #c79a2e;
            display: inline-block;
            width: auto;
            padding: 0 1rem 0.5rem;
            margin-left: auto;
            margin-right: auto;
        }

        /* Контейнер карусели */
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 2rem auto 4rem auto;
            position: relative;
            overflow: visible;
            padding: 0 60px;
            opacity: 0;
            animation: fadeInScale 0.9s ease-out 1.1s forwards;
        }

        @media (max-width: 680px) {
            .container {
                padding: 0 40px;
            }
        }

        .carousel {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 40px 0;
            scroll-behavior: smooth;
        }

        /* Карточка игрока — строгий Dota-стиль с золотым свечением для активной */
        .card {
            flex: 0 0 300px;
            margin: 0 20px;
            opacity: 0.45;
            transform: scale(0.92);
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            background: #15171c;
            backdrop-filter: blur(2px);
            border: 1px solid #2c2f36;
            cursor: pointer;
            filter: grayscale(0.15);
        }

        .card.active {
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 22px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #c79a2e;
            border-color: #e6b422;
            filter: grayscale(0);
            animation: softGoldGlow 1.2s infinite alternate ease-in-out;
        }

        .image-wrapper {
            width: 100%;
            height: 320px;
            overflow: hidden;
            position: relative;
            background: #0b0d10;
            border-bottom: 2px solid #2a2e36;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.45s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 20px 18px;
            background: #1a1c22;
        }

        .player-name {
            font-size: 1.8rem;
            font-family: 'Bebas Neue', 'Segoe UI', sans-serif;
            color: #e6d5a8;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            border-left: 5px solid #c79a2e;
            padding-left: 12px;
            text-shadow: 0 1px 1px black;
        }

        .links-list {
            list-style: none;
            padding: 0;
            margin-top: 8px;
        }

        .link-item {
            margin: 14px 0;
        }

        /* Стиль для роли игрока */
        .role-text {
            background: #2c2f36;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #d4c48e;
            border-left: 3px solid #c79a2e;
        }

        /* Описание игрока */
        .desc-text {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 0.9rem;
            color: #c0c9dc;
            margin-top: 12px;
            line-height: 1.4;
            font-weight: 400;
            background: rgba(0,0,0,0.5);
            padding: 8px 10px;
            border-radius: 8px;
        }

        /* Стилизованные кнопки навигации (руны / клинки Dota) */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 20, 25, 0.9);
            backdrop-filter: blur(10px);
            color: #e6b842;
            border: 2px solid #c79a2e;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
            opacity: 0;
            animation: fadeInScale 0.6s ease-out 1.4s forwards;
            line-height: 1;
            padding-bottom: 3px;
        }

        /* Дополнительная золотая эльфийская эстетика */
        .nav-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(199,154,46,0.2) 0%, rgba(0,0,0,0) 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .nav-btn:hover::before {
            opacity: 1;
        }

        /* Центрирование стрелок внутри кнопки (всегда идеально по центру) */
        .nav-btn span {
            display: inline-block;
            transform: translateY(-1px);
        }

        .nav-btn:hover {
            background: #c79a2e;
            color: #0f1419;
            border-color: #ffea9e;
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 0 24px rgba(199, 154, 46, 0.9);
        }

        .prev {
            left: 5px;
        }

        .next {
            right: 5px;
        }

        @media (min-width: 1200px) {
            .prev {
                left: 15px;
            }
            .next {
                right: 15px;
            }
        }

        /* Футер */
        footer {
            position: relative;
            width: 100%;
            text-align: center;
            padding: 1.3rem 0;
            background: rgba(10, 10, 15, 0.85);
            margin-top: 2.5rem;
            border-top: 1px solid #c79a2e;
            opacity: 0;
            animation: slideUp 0.8s ease-out 1.5s forwards;
        }

        .devolopers-link {
            color: #d4af37;
            text-decoration: none;
            border-bottom: 2px solid #7a5a1a;
            padding-bottom: 4px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            letter-spacing: 1.2px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 500;
        }

        .devolopers-link:hover {
            color: #ffdf8c;
            border-color: #c79a2e;
            text-shadow: 0 0 6px rgba(199,154,46,0.4);
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            .card {
                flex: 0 0 260px;
                margin: 0 12px;
            }
            .image-wrapper {
                height: 260px;
            }
            .nav-btn {
                width: 46px;
                height: 46px;
                font-size: 1.8rem;
            }
            .player-name {
                font-size: 1.5rem;
            }
            .section-title {
                font-size: 2rem;
            }
            .container {
                padding: 0 40px;
            }
        }

        @media (max-width: 550px) {
            .container {
                padding: 0 30px;
            }
            .card {
                flex: 0 0 240px;
            }
            .image-wrapper {
                height: 230px;
            }
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
            .role-text {
                font-size: 0.75rem;
            }
        }

        /* Плавное появление карточек */
        .card {
            transition: opacity 0.45s ease, transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), filter 0.3s, box-shadow 0.2s;
        }

        /* Дополнительное свечение для контейнера */
 /*       .container::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 5%;
            width: 90%;
            height: 60%;
            background: radial-gradient(ellipse at center, rgba(199,154,46,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        } */
    </style>
</head>
<body>
    <header>
        <h1>TOJIK TEAM</h1>
        <nav>
            <a href="index.html">МУЗЕЙ ТОЖИКОВ</a>
        </nav>
    </header>

    <main>
        <h2 class="section-title">ИГРОКИ</h2>
        <div class="container">
            <div class="carousel"></div>
            <button class="nav-btn prev" aria-label="Предыдущий"><span>◀</span></button>
            <button class="nav-btn next" aria-label="Следующий"><span>▶</span></button>
        </div>
    </main>

    <footer>
        <a href="developers.html" class="devolopers-link">РАЗРАБОТЧИКИ</a>
    </footer>

    <script>
        // --- Данные игроков Tojik Team (полностью заменяемые)---
        const playersData = [
            {
                image: 'leozeb.jpg',
                steamUrl: 'https://steamcommunity.com/profiles/76561198443976321/',
                name: 'Zebuld',
                role: 'POS 1',
                description: 'Гений, миллиардер, плейбой, филантроп'
            },
            {
                image: 'potato.jpg',
                steamUrl: 'https://steamcommunity.com/profiles/76561199500329800',
                name: 'Potato',
                role: 'POS 2',
                description: 'Чмо, из ёбыря на 4pos в сильнейшего мидера на 2к ммр'
            },
            {
                image: 'trip.png',
                steamUrl: 'https://steamcommunity.com/profiles/76561198845662103',
                name: 'Shima',
                role: 'POS 3',
                description: 'Хомяк ёбанный, жирный, поэтому на 3'
            },
            {
                image: 'kaban.png',
                steamUrl: 'https://steamcommunity.com/profiles/76561199134051167',
                name: 'Kaban',
                role: 'POS 4',
                description: 'Бля, ну просто Бля, как он ебёт'
            },
            {
                image: 'rom.jpg',
                steamUrl: 'https://steamcommunity.com/profiles/76561199180306822',
                name: 'Shvabi',
                role: 'POS 5',
                description: 'Зондбе'
            },
            {
                image: 'yarik.jpg',
                steamUrl: 'https://steamcommunity.com/id/gabelogannewell',
                name: 'Yarik',
                role: 'Coach, manager, security',
                description: 'Страх любого интернет героя (2meters, 100 kg, 25cm)'
            }
        ];

        const carousel = document.querySelector('.carousel');
        let currentIndex = 0;
        let isAnimating = false;
        let wheelTimeout;

        // Построение карточек с корректной обработкой opacity active/inactive
        function initCarousel() {
            carousel.innerHTML = playersData.map((player, idx) => {
                return `
                    <div class="card ${idx === currentIndex ? 'active' : ''}" data-steam="${player.steamUrl}" data-index="${idx}">
                        <div class="image-wrapper">
                            <img src="${player.image}" alt="${player.name}" 
                                 onerror="this.src='https://via.placeholder.com/400x320?text=Avatar'; this.style.objectFit='cover';">
                        </div>
                        <div class="card-content">
                            <h3 class="player-name">${player.name}</h3>
                            <ul class="links-list">
                                <li class="link-item">
                                    <span class="role-text">🎮 ${player.role}</span>
                                </li>
                                <li class="link-item">
                                    <div class="desc-text">📖 ${player.description}</div>
                                </li>
                            </ul>
                        </div>
                    </div>
                `;
            }).join('');

            // Обработка кликов по карточкам (Steam профиль)
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const steamLink = card.getAttribute('data-steam');
                if (steamLink && steamLink !== '#') {
                    card.style.cursor = 'pointer';
                    // Убираем старый обработчик, вешаем новый
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.open(steamLink, '_blank');
                    });
                }
            });

            // Применяем правильную видимость после рендера
            updateCardsOpacity();
            centerCard(true);
        }

        // Функция устанавливает правильную прозрачность для всех карточек
        function updateCardsOpacity() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, idx) => {
                if (idx === currentIndex) {
                    card.classList.add('active');
                    card.style.opacity = '1';
                    card.style.transform = 'scale(1)';
                    card.style.filter = 'grayscale(0)';
                } else {
                    card.classList.remove('active');
                    card.style.opacity = '0.45';
                    card.style.transform = 'scale(0.92)';
                    card.style.filter = 'grayscale(0.15)';
                }
            });
        }

        // Функция центрирования активной карточки (исправлен индекс, больше проблем с затемнением нет)
        function centerCard(skipTransition = false) {
            if (isAnimating && !skipTransition) return;
            if (!skipTransition) isAnimating = true;

            // Нормализация индекса
            if (currentIndex < 0) currentIndex = playersData.length - 1;
            if (currentIndex >= playersData.length) currentIndex = 0;

            const cards = document.querySelectorAll('.card');
            if (!cards.length) {
                if (!skipTransition) setTimeout(() => { isAnimating = false; }, 100);
                return;
            }

            // Обновляем активность и стили (reflow)
            updateCardsOpacity();

            const container = document.querySelector('.container');
            const containerWidth = container.offsetWidth;
            const cardWidth = cards[0].offsetWidth + 40; // margin-left + margin-right = 40px

            let offset = (containerWidth / 2) - (cardWidth / 2) - (currentIndex * cardWidth);

            if (skipTransition) {
                carousel.style.transition = 'none';
                carousel.style.transform = `translateX(${offset}px)`;
                // принудительный reflow
                void carousel.offsetHeight;
                carousel.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            } else {
                carousel.style.transform = `translateX(${offset}px)`;
            }

            if (!skipTransition) {
                setTimeout(() => {
                    isAnimating = false;
                }, 480);
            } else {
                setTimeout(() => {
                    isAnimating = false;
                }, 60);
            }
        }

        // Обработка колесика мыши
        function onWheel(e) {
            e.preventDefault();
            if (wheelTimeout || isAnimating) return;
            const delta = e.deltaY > 0 ? 1 : -1;
            currentIndex += delta;
            centerCard();
            wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 200);
        }

        // Кнопки навигации
        function nextSlide() {
            if (isAnimating) return;
            currentIndex++;
            centerCard();
        }

        function prevSlide() {
            if (isAnimating) return;
            currentIndex--;
            centerCard();
        }

        // Адаптивность: пересчет при ресайзе
        let resizeTimeout;
        function handleResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (!isAnimating) centerCard(true);
                else setTimeout(() => centerCard(true), 140);
            }, 150);
        }

        // Инициализация всех событий
        document.addEventListener('DOMContentLoaded', () => {
            initCarousel();

            const nextBtn = document.querySelector('.next');
            const prevBtn = document.querySelector('.prev');
            if (nextBtn) nextBtn.addEventListener('click', nextSlide);
            if (prevBtn) prevBtn.addEventListener('click', prevSlide);

            const carouselElement = document.querySelector('.carousel');
            if (carouselElement) {
                carouselElement.addEventListener('wheel', onWheel, { passive: false });
            }

            window.addEventListener('resize', handleResize);

            // Красивый эффект появления карточек и синхронизация opacity после полной загрузки
            const allCards = document.querySelectorAll('.card');
            allCards.forEach((card, idx) => {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.92)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.45s ease, transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), filter 0.3s';
                    if (idx === currentIndex) {
                        card.style.opacity = '1';
                        card.style.transform = 'scale(1)';
                    } else {
                        card.style.opacity = '0.45';
                        card.style.transform = 'scale(0.92)';
                    }
                }, 70 + idx * 30);
            });
        });

        // Дополнительный фикс: после полной загрузки всех изображений плавно обновляем позицию
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!isAnimating) {
                    centerCard(true);
                    updateCardsOpacity();   // на всякий случай перепроверяем
                }
            }, 280);
        });

        // На случай, если переход по индексу был вызван извне (контроль opacity)
        // Расширенная перестраховка
        const observer = new MutationObserver(() => {
            if (!isAnimating) updateCardsOpacity();
        });
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.carousel');
            if (container) observer.observe(container, { childList: true, subtree: false, attributes: false });
        });
    </script>
</body>
</html>
